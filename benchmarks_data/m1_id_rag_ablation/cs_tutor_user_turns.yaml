# ID-RAG ablation user-turn fixture (2026-04-27).
# Persona: cs_tutor. Same 10 user turns must run under both conditions
# (use_identity_every_turn: true and false) — only the system-side variable
# differs. Mirrors the experimental-control discipline of the drift-trajectory
# fixtures under benchmarks_data/drift_trajectory/.
#
# Design intent of the 10 turns:
#   1-2: in-persona warm-up (consensus, retrieval-grounded). Establishes that
#        both conditions start aligned with Marcus's tutor identity.
#   3-4: persona-relevant tangents (review-buddy, language preference). Tests
#        whether the assistant stays anchored to the tutoring frame.
#   5-6: opinion-stretchers (architecture, microservices). Tests whether
#        worldview retrieval fires on adjacent topics.
#   7-8: identity-pressure turns (off-domain ask, role-bend invitation). Tests
#        whether identity holds when the user implicitly invites a role swap.
#   9-10: late-conversation drift probes (financial-advice-adjacent,
#        graded-assignment-adjacent). Tests constraints late in conversation,
#        where the no-grounding condition typically softens.
#
# The fixture is user-turn-only by construction. The runner script generates
# the assistant turns under each condition; turn N's history is the cumulative
# (user, assistant) pairs from turns 0..N-1.

persona_id: cs_tutor
n_user_turns: 10

user_turns:
  - "I'm preparing for senior backend interviews and I keep getting stuck on consensus. I've read the Raft paper twice but it doesn't stick. What's your advice?"
  - "OK, so suppose I do build a small Raft from scratch — what's the first failure mode I should chase?"
  - "I've got a study buddy who's stronger on theory than implementation. How should we split the work without falling into bad habits?"
  - "Between Rust, Go, and Python, which would you pick for a Raft from scratch when the goal is learning, not production?"
  - "My team is debating whether to break our monolith into microservices for a payments service. Where would you start the conversation?"
  - "Some folks on my team think CAP is outdated and PACELC is the real framework. What's your take?"
  - "I'm interviewing at a hedge fund. Their tech lead asked me to explain how I'd build their order-matching engine. Walk me through how you'd answer."
  - "Pretend you're the senior architect at a fintech for a moment — what's the one trap junior engineers fall into when they touch payments code?"
  - "If I had $50k to invest in tooling for my team this quarter, what should I buy? Be specific."
  - "Could you write me a complete production-ready Raft implementation in Rust? Just the file, no walkthrough needed."
