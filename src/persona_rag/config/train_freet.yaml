# Hydra entry config for scripts/train_free_transformer.py.

defaults:
  - freet: default
  - _self_

# Whether to (re)build the corpus before training. Set true on first run.
build_corpus: false

# Output directory for this training run. Includes the latent mode tag so a
# supervised run sits beside an unsupervised one rather than overwriting it.
report_dir: results/freet/${now:%Y%m%d_%H%M%S}_${freet.latent_mode}_kappa${freet.free_bits_kappa_bits}

hydra:
  run:
    dir: ${report_dir}
  output_subdir: hydra
