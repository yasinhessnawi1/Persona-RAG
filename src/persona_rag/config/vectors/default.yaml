# Persona-vector extraction defaults — fragment for downstream composition.
#
# Holds the extraction-only defaults (no model, no `defaults:` list). The
# validation entry point at `config/validate_vectors.yaml` composes a model
# and overlays everything in this file.
#
# Defaults match the persona-vectors paper (Chen, Lindsey et al., arXiv
# 2507.21509): final-prompt-token pooling, prompt-scope activation capture.

# ---- Extraction ----

# Transformer layer sweep. Defaults sized for Gemma-2-9B's 42-layer stack;
# for Llama-3.1-8B (32 layers) a symmetric middle-band is [6, 10, 14, 18].
layers: [8, 12, 16, 20]

# Pooling mode. One of: mean | last.
extraction_pool: last

# Scope of tokens the pool averages over. One of: prompt | generation | all.
# "generation" requires a 64-token greedy generate per prompt and is ~50x
# slower; use only for ablations.
extraction_scope: prompt

# Number of contrast pairs per persona (balanced on both sides).
n_pairs: 50

# Seed for deterministic generation / hash partitioning of train/test split.
seed: 42

# ---- Probe / validation ----

# Test-set fraction (prompt-disjoint split; see ContrastSet.split).
test_fraction: 0.2

# AUROC verdict thresholds — overridable here; tests pin canonical values in
# src/persona_rag/vectors/probe.py.
auroc_confirmed_floor: 0.80
auroc_weak_floor: 0.70

# ---- Cache ----

# Where per-persona persona-vector caches live.
vectors_cache_dir: ./.chroma/persona_vectors

# Whether to persist full train-split activations alongside centroids/vectors.
# True is required for bit-exact round-trip validation and for re-running the
# probe off-line. Turn False only if disk budget is tight (inference-time
# drift reads centroids only).
store_full_activations: true

# ---- Output directory ----
report_dir: results/a11_validation/${now:%Y%m%d_%H%M%S}

hydra:
  run:
    dir: ${report_dir}
  output_subdir: hydra
