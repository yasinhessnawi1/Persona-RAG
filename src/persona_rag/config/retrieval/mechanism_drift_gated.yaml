# Drift-gated hybrid retrieval mechanism.
#
# Cheap path: an LLM-judge gate decides each turn drift/ok; on ok, the
# responder produces the reply (2 LLM calls).
# Gated path: on drift, retrieval re-keys on the drifted-turn content,
# extra candidates are generated at varied temperatures, and the 2-signal
# hybrid ranker (reward model + cross-family LLM judge) picks the best.
#
# All knobs are Hydra-controllable; per-turn metadata records every choice.
name: drift_gated
type: m3

# ---- Drift gate ----
gate:
  # Qwen2.5-7B-Instruct is the operational gate-judge after the four-judge
  # cross-tier calibration sweep (Llama-3.1-8B / Prometheus-2-7B /
  # Qwen2.5-7B / GLM-4.7-API). Qwen produced the best headline differential
  # (+0.40) on the four-axis structured-reasoning prompt, with the lowest
  # in_persona false-positive rate (~7%) and 30/30 axis-population rate.
  # SDPA attention (override in qwen.yaml) — eager + fp16 + 4-bit triggers
  # NaN logits on V100 for Qwen's bf16-trained weights.
  judge_model: Qwen/Qwen2.5-7B-Instruct
  judge_name: qwen2.5-7b-instruct
  # Confidence threshold for the gate to fire. Tuned via the calibration
  # sweep at evaluation time; default 0.5. Qwen's confidences cluster at
  # 0.6-1.0 for drift verdicts, so thresholds in {0.3, 0.4, 0.5, 0.6}
  # produce identical flag-rates; threshold 0.7 starts dropping signal.
  confidence_threshold: 0.5
  # History window threaded into the gate prompt (turns; 4 = two prior pairs).
  history_window: 4
  # Generation budget for the four-axis JSON response. The gate template's
  # output budget is the limiting factor: Qwen sometimes emits the JSON
  # twice (multi-output), so we leave headroom; the parser takes the
  # first balanced object.
  max_new_tokens: 256
  temperature: 0.0

# ---- Hybrid ranker ----
hybrid_ranker:
  # 1-signal LLM-judge re-rank. The 2-signal alternative
  # (["character_rm", "judge"]) is supported by the code path; flip back
  # if the reward model's loader and GPU footprint are addressed (vendored
  # custom-class loader + 4-bit quant + judge offload between calls).
  enabled_signals: ["judge"]
  weights:
    character_rm: 0.5
    judge: 0.5
  character_rm:
    # CharacterEval reward model (Baichuan-based instruct backbone).
    model_id: morecry/BaichuanCharRM
    device: cuda
    max_input_tokens: 2048
  rerank_judge:
    # Purpose-built evaluator (Mistral-Instruct base). Different family
    # from the gate's Llama-3.1-8B.
    model_id: prometheus-eval/prometheus-7b-v2.0
    name: prometheus-2-7b
    max_new_tokens: 64
    temperature: 0.0

# ---- Candidate generation ----
# n_candidates ranks 3 total: baseline (1, greedy via the responder's
# config) plus (n_candidates - 1) additional candidates at
# extra_candidate_temperatures. The N sweep at evaluation time covers
# {1, 3, 5}.
n_candidates: 3
extra_candidate_temperatures: [0.7, 1.0]
extra_candidate_max_new_tokens: null  # null → reuse the responder's max_new_tokens

# ---- Cheap-path responder settings ----
# Mirrors config/retrieval/typed_retrieval.yaml. The mechanism calls the
# typed-retrieval responder with augment_for_drift=true on the gated path;
# the rest of its behaviour is unchanged.
m1:
  use_identity_every_turn: true
  use_epistemic_tags: true
  use_episodic: false
  write_episodic: false
  epistemic_allowlist: ["fact", "belief", "hypothesis", "contested"]
  top_k_self_facts: 3
  top_k_worldview: 3
  top_k_episodic: 0
  top_k_knowledge: 5
  candidate_pool: 20
  alpha: null
  max_new_tokens: 256
  max_input_tokens: 4096
