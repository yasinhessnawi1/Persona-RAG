# intfloat/e5-large-v2 embedder configuration (cross-family comparison).
#
# E5 prefix convention: queries get "query: ", passages get "passage: ".
name: e5_large
model_id: intfloat/e5-large-v2
family: e5
dimension: 1024
max_seq_length: 512
normalize: true
batch_size: 64
device: auto
dtype: float16
query_prefix: "query: "
passage_prefix: "passage: "
