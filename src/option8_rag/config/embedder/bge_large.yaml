# BGE-large-en-v1.5 embedder configuration.
#
# Asymmetric retrieval: queries get the BGE prefix, passages do not.
name: bge_large
model_id: BAAI/bge-large-en-v1.5
family: bge
dimension: 1024
max_seq_length: 512
normalize: true
batch_size: 64
device: auto  # auto | cuda | cpu
dtype: float16  # V100 hardware target
query_prefix: "Represent this sentence for searching relevant passages: "
passage_prefix: ""
