# Llama-3.1-8B-Instruct generator on V100 (fp16).
name: llama31_8b
model_id: meta-llama/Llama-3.1-8B-Instruct
dtype: float16
device: auto
attn_implementation: sdpa  # default; Llama 3.1 has no eager-only requirement
max_new_tokens: 512
temperature: 0.0
top_p: 1.0
do_sample: false
# How many retrieved chunks to feed into the prompt.
context_top_k: 5
# System-prompt style: "verbose" (citations + explanations) or
# "extractive" (bare-fact, 1-5 word answers, optimised for EM/F1).
prompt_style: verbose
