# Hybrid retriever: BM25 + dense fused via Reciprocal-Rank-Fusion.
name: hybrid
top_k: 10
# Per-branch candidate pool size. RRF over the two top-N lists.
dense_top_n: 100
bm25_top_n: 100
# RRF k constant from Cormack et al. (2009); 60 is the standard default.
rrf_k: 60
chroma:
  hnsw_space: cosine
  hnsw_ef_search: 100
lowercase: true
