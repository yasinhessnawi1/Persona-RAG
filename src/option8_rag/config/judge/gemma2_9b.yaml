# Gemma-2-9B-it as the LLM-as-judge for groundedness.
#
# Different model family from the generator to limit self-grading bias.
# Gemma 2 requires `attn_implementation="eager"` on transformers <4.50.
name: gemma2_9b
model_id: google/gemma-2-9b-it
dtype: float16
device: auto
attn_implementation: eager
max_new_tokens: 256
temperature: 0.0
top_p: 1.0
do_sample: false
